<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020204">
    <title>Таймер ПДА, ТДИ-01 PRO</title>
    <style>
        :root {
            --bg: #020204;
            --panel-bg: #0a0b10;
            --text: #c9d1d9;
            --muted: #4e5661;
            --border: #161b22;
            --btn-bg: #0d1117;
        }

        /* Цветовые схемы планет */
        .theme-earth { --p-glow: #00ffca; --p-core: #0d2c54; --p-fill: #1b4d3e; }
        .theme-mars { --p-glow: #ff4500; --p-core: #4a0e0e; --p-fill: #8b0000; }
        .theme-venus { --p-glow: #ffd700; --p-core: #4a3c1a; --p-fill: #b8860b; }
        .theme-neptune { --p-glow: #00bfff; --p-core: #001f3f; --p-fill: #0074d9; }
        .theme-jupiter { --p-glow: #ff8c00; --p-core: #3d2b1f; --p-fill: #a0522d; }
        .theme-moon { --p-glow: #ffffff; --p-core: #1a1a1a; --p-fill: #708090; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; min-height: 100dvh; display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; 
            user-select: none; -webkit-user-select: none;
            touch-action: manipulation;
        }

        .app-wrapper { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }

        @media (min-width: 768px) and (orientation: landscape) {
            .app-wrapper { max-width: 1000px; flex-direction: row; align-items: center; }
            .settings-panel { flex: 1; border-right: 1px solid var(--border); padding-right: 40px; }
            .visual-panel { flex: 1.4; }
        }

        h1 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--text); letter-spacing: 1.5px; text-align: center; opacity: 0.6; }

        .row { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); }
        .label { font-size: 0.85rem; color: #8b949e; display: flex; align-items: center; gap: 8px; }
        .input-group { display: flex; align-items: center; gap: 4px; }
        
        input[type="number"] { width: 44px; background: #000; border: 1px solid var(--border); color: white; padding: 6px 3px; border-radius: 6px; text-align: center; font-size: 0.95rem; outline: none; }
        button.tool { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: var(--btn-bg); color: var(--text); cursor: pointer; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--p-glow); cursor: pointer; }

        /* Визуализация */
        .visual-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; width: 100%; position: relative; }
        
        #circle-container {
            width: min(70vw, 300px); height: min(70vw, 300px);
            aspect-ratio: 1/1; position: relative; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        #circle {
            width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid var(--p-glow); 
            background: radial-gradient(circle, var(--p-core) 0%, var(--p-fill) 70%, transparent 100%);
            box-shadow: 0 0 35px var(--p-glow), inset 0 0 25px rgba(0,0,0,0.7);
            transform: scale(0.001); transition: border-color 0.4s, box-shadow 0.4s, transform 0.1s linear;
            will-change: transform;
        }

        #phase-counter { 
            position: absolute; font-size: 2.5rem; font-weight: 300; 
            color: rgba(255, 255, 255, 0.9); text-shadow: 0 0 20px var(--p-glow); pointer-events: none; 
        }

        .controls { display: flex; gap: 12px; width: 100%; max-width: 320px; }
        .btn { flex: 1; padding: 14px 0; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; font-size: 0.85rem; font-weight: 600; -webkit-tap-highlight-color: transparent; }
        .btn-start { background: #0e1a14; color: #44cf6e; }
        .btn-stop { background: #1a0b0c; color: #f85149; }
        .btn-focus { background: transparent; color: var(--muted); width: 100%; max-width: 320px; margin-top: 10px; border: 1px dashed var(--border); }

        /* Режим ФОКУС */
        body.focus-mode .settings-panel, 
        body.focus-mode .controls, 
        body.focus-mode #focus-btn,
        body.focus-mode h1 { display: none !important; }

        body.focus-mode .visual-panel { position: fixed; inset: 0; background: var(--bg); z-index: 100; justify-content: center; height: 100dvh; }
        body.focus-mode #circle-container { width: min(85vw, 70dvh); height: min(85vw, 70dvh); }
        
        #focus-exit { 
            display: none; position: absolute; top: 40px; left: 30px; z-index: 105; 
            color: var(--muted); cursor: pointer; padding: 15px; -webkit-tap-highlight-color: transparent;
        }
        body.focus-mode #focus-exit { display: block; }

        #end-screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="theme-earth">

<div class="app-wrapper" id="main-app">
    <div class="settings-panel">
        <h1>Таймер ПДА, ТДИ-01</h1>
        
        <div class="row" style="background:transparent; border:none; padding: 5px 14px;">
            <span class="label">Текущий ПДА (сек)</span><b id="pda-val" style="color:var(--p-glow); font-size: 1.3rem; transition: color 0.4s;">22</b>
        </div>
        
        <div class="row"><span class="label">Время занятия (мин)</span>
            <div class="input-group">
                <input type="number" id="in-duration" value="15" min="1" readonly>
                <button class="tool" onclick="adj('duration', -1)">−</button><button class="tool" onclick="adj('duration', 1)">+</button>
            </div>
        </div>
        <div class="row"><span class="label">Вдох (сек)</span>
            <div class="input-group">
                <input type="number" id="in-inhale" value="2" min="1" readonly>
                <button class="tool" onclick="adj('inhale', -1)">−</button><button class="tool" onclick="adj('inhale', 1)">+</button>
            </div>
        </div>
        <div class="row"><span class="label">Выдох (сек)</span>
            <div class="input-group">
                <input type="number" id="in-exhale" value="20" min="1" readonly>
                <button class="tool" onclick="adj('exhale', -1)">−</button><button class="tool" onclick="adj('exhale', 1)">+</button>
            </div>
        </div>
        <div class="row"><span class="label">Довыдох (сек)</span>
            <div class="input-group">
                <input type="number" id="in-pause" value="0" min="0" readonly>
                <button class="tool" onclick="adj('pause', -1)">−</button><button class="tool" onclick="adj('pause', 1)">+</button>
            </div>
        </div>
        <div class="row"><span class="label"><input type="checkbox" id="delay-on" checked onchange="save()"> Отложенный старт</span>
            <div class="input-group">
                <input type="number" id="in-delay" value="5" min="1" readonly>
                <button class="tool" onclick="adj('delay', -1)">−</button><button class="tool" onclick="adj('delay', 1)">+</button>
            </div>
        </div>
        
        <div class="row" style="background:transparent; border:none; padding: 10px 0; justify-content: flex-start; gap: 30px;">
            <span class="label"><input type="checkbox" id="sound-on" checked onchange="save()"> Звук</span>
            <span class="label"><input type="checkbox" id="vibrate-on" checked onchange="save()"> Вибрация</span>
        </div>
    </div>

    <div class="visual-panel">
        <div id="focus-exit" onclick="toggleFocus()">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </div>

        <div id="phase-name" style="letter-spacing: 4px; font-size: 0.85rem; color: var(--muted); height: 1.2rem; text-transform: uppercase; font-weight: 600;">ГОТОВ</div>
        
        <div id="circle-container" onclick="nextTheme(event)">
            <div id="circle"></div>
            <div id="phase-counter"></div>
        </div>
        
        <div id="session-timer" style="font-variant-numeric: tabular-nums; color: var(--muted); font-size: 1rem; letter-spacing: 1px;">Осталось: 00:00</div>
        
        <div class="controls">
            <button class="btn btn-stop" onclick="manualStop()">СТОП</button>
            <button class="btn btn-start" id="start-btn" onclick="start()">СТАРТ</button>
        </div>
        <button class="btn btn-focus" id="focus-btn" onclick="toggleFocus()">ФОКУСИРОВКА</button>
    </div>
</div>

<div id="end-screen">
    <h2 style="color:var(--p-glow); font-weight: 200; letter-spacing: 2px;">ТРЕНИРОВКА ЗАВЕРШЕНА</h2>
    <div style="background: var(--panel-bg); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <p style="display:flex; justify-content: space-between; margin: 10px 0;">Циклов: <b id="stat-cycles">0</b></p>
        <p style="display:flex; justify-content: space-between; margin: 10px 0;">Время выдоха: <b id="stat-exhale">0 сек</b></p>
    </div>
    <button class="btn" style="margin-top: 30px; background: #fff; color: #000; width: 180px;" onclick="location.reload()">В МЕНЮ</button>
</div>

<script>
    let audioCtx, timerId, animId, startTime, wakeLock = null;
    let state = { isRunning: false, totalTime: 0, cycles: 0, totalExhale: 0, currentPhase: 'none' };
    
    const themes = ['theme-earth', 'theme-mars', 'theme-venus', 'theme-neptune', 'theme-jupiter', 'theme-moon'];
    let currentThemeIdx = 0;

    function adj(id, delta) {
        const el = document.getElementById('in-' + id);
        el.value = Math.max(el.min, parseInt(el.value) + delta);
        save();
    }

    function nextTheme(e) {
        // Предотвращаем любые всплытия, чтобы не триггерить другие элементы
        if (e) e.stopPropagation();
        
        // Удаляем старый класс темы
        document.body.classList.remove(themes[currentThemeIdx]);
        
        // Считаем новый индекс
        currentThemeIdx = (currentThemeIdx + 1) % themes.length;
        
        // Добавляем новый класс темы (classList не затронет focus-mode)
        document.body.classList.add(themes[currentThemeIdx]);
        save();
    }

    function feedback(type) {
        if (document.getElementById('sound-on').checked) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(type === 'end' ? 432 : 320, audioCtx.currentTime);
            g.gain.setValueAtTime(0.4, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (type === 'end' ? 1.5 : 0.4));
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        }
        if (document.getElementById('vibrate-on').checked && 'vibrate' in navigator) {
            navigator.vibrate(type === 'end' ? [200, 100, 200] : 80);
        }
    }

    function start() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        state.isRunning = true;
        state.cycles = 0; state.totalExhale = 0;
        state.totalTime = parseInt(document.getElementById('in-duration').value) * 60;
        document.getElementById('start-btn').classList.add('hidden');
        
        if (document.getElementById('delay-on').checked) {
            runPhase('delay', parseInt(document.getElementById('in-delay').value));
        } else {
            runPhase('inhale', parseInt(document.getElementById('in-inhale').value));
        }
        
        timerId = setInterval(tick, 1000);
        requestAnimationFrame(animate);
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
    }

    function tick() {
        state.timeLeft--;
        if (state.currentPhase !== 'delay') state.totalTime--;

        if (state.currentPhase === 'exhale') {
            state.totalExhale++;
            if (state.timeLeft <= 5 && state.timeLeft > 0) feedback('tick');
        }
        if (state.currentPhase === 'delay') feedback('tick');

        if (state.timeLeft <= 0) {
            if (state.totalTime <= 0 && state.currentPhase !== 'delay') return finish();
            
            if (state.currentPhase === 'delay') {
                runPhase('inhale', parseInt(document.getElementById('in-inhale').value));
            } else if (state.currentPhase === 'inhale') {
                runPhase('exhale', parseInt(document.getElementById('in-exhale').value));
            } else if (state.currentPhase === 'exhale') {
                state.cycles++;
                let p = parseInt(document.getElementById('in-pause').value);
                p > 0 ? runPhase('pause', p) : runPhase('inhale', parseInt(document.getElementById('in-inhale').value));
            } else {
                runPhase('inhale', parseInt(document.getElementById('in-inhale').value));
            }
        }
        updateUI();
    }

    function runPhase(p, dur) {
        state.currentPhase = p;
        state.timeLeft = dur;
        state.phaseDuration = dur;
        startTime = performance.now();
        const labels = {inhale: 'ВДОХ', exhale: 'ВЫДОХ', pause: 'ДОВЫДОХ', delay: 'ПРИГОТОВЬТЕСЬ'};
        document.getElementById('phase-name').innerText = labels[p] || '';
    }

    function updateUI() {
        const m = Math.max(0, Math.floor(state.totalTime / 60));
        const s = Math.max(0, state.totalTime % 60);
        document.getElementById('session-timer').innerText = `Осталось: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        let showCounter = (state.currentPhase === 'exhale' && state.timeLeft <= 5) || (state.currentPhase === 'delay');
        document.getElementById('phase-counter').innerText = showCounter ? state.timeLeft : '';
    }

    function animate() {
        if (!state.isRunning) return;
        const now = performance.now();
        const p = Math.min((now - startTime) / (state.phaseDuration * 1000), 1);
        let s = 0.001;
        if (state.currentPhase === 'inhale') s = 0.001 + (0.999 * p);
        else if (state.currentPhase === 'exhale') s = 1.0 - (0.999 * p);
        else s = 0.001;
        document.getElementById('circle').style.transform = `scale(${s})`;
        animId = requestAnimationFrame(animate);
    }

    function finish() {
        state.isRunning = false;
        clearInterval(timerId);
        document.getElementById('stat-cycles').innerText = state.cycles;
        document.getElementById('stat-exhale').innerText = state.totalExhale + ' сек';
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('end-screen').style.display = 'flex';
        feedback('end');
    }

    function manualStop() { if(confirm('Прервать тренировку?')) location.reload(); }
    
    function toggleFocus() { 
        document.body.classList.toggle('focus-mode'); 
    }

    function save() {
        const data = {
            themeIdx: currentThemeIdx,
            d: document.getElementById('in-duration').value,
            i: document.getElementById('in-inhale').value,
            e: document.getElementById('in-exhale').value,
            p: document.getElementById('in-pause').value,
            del: document.getElementById('in-delay').value,
            delOn: document.getElementById('delay-on').checked,
            s: document.getElementById('sound-on').checked,
            v: document.getElementById('vibrate-on').checked
        };
        localStorage.setItem('frolov_v5_final', JSON.stringify(data));
        document.getElementById('pda-val').innerText = Number(data.i) + Number(data.e) + Number(data.p);
    }

    function load() {
        const saved = JSON.parse(localStorage.getItem('frolov_v5_final'));
        if (saved) {
            currentThemeIdx = saved.themeIdx || 0;
            document.getElementById('in-duration').value = saved.d || 15;
            document.getElementById('in-inhale').value = saved.i || 2;
            document.getElementById('in-exhale').value = saved.e || 20;
            document.getElementById('in-pause').value = saved.p || 0;
            document.getElementById('in-delay').value = saved.del || 5;
            document.getElementById('delay-on').checked = saved.delOn !== undefined ? saved.delOn : true;
            document.getElementById('sound-on').checked = saved.s !== undefined ? saved.s : true;
            document.getElementById('vibrate-on').checked = saved.v !== undefined ? saved.v : true;
        }
        // Применяем тему через classList, чтобы не затереть ничего лишнего
        themes.forEach(t => document.body.classList.remove(t));
        document.body.classList.add(themes[currentThemeIdx]);
        
        document.getElementById('pda-val').innerText = Number(document.getElementById('in-inhale').value) + Number(document.getElementById('in-exhale').value) + Number(document.getElementById('in-pause').value);
    }

    load();
</script>
</body>
</html>
