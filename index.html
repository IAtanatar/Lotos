<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таймер ПДА, ТДИ-01 PRO (Night Green Edition)</title>
    <style>
        :root {
            --bg: #020204;
            --panel-bg: #0a0b10;
            --text: #c9d1d9;
            --muted: #4e5661;
            --border: #161b22;
            --btn-bg: #0d1117;
            
            /* Обновленная ночная палитра с зеленоватой аурой */
            --neon-edge: #00ffca; /* Зеленовато-бирюзовый край */
            --core-purple: #1a0033; /* Глубокий темно-фиолетовый центр */
            --fill-indigo: #0d0066; /* Переходный индиго */
            --glow-out: rgba(0, 255, 202, 0.4); /* Внешнее зеленоватое свечение */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* --- Адаптивность --- */
        .app-wrapper {
            width: 100%; max-width: 450px; padding: 15px;
            display: flex; flex-direction: column; gap: 15px; box-sizing: border-box;
            transition: opacity 0.4s;
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .app-wrapper { max-width: 950px; flex-direction: row; align-items: stretch; gap: 40px; }
            .settings-panel { flex: 1; border-right: 1px solid var(--border); padding-right: 40px; }
            .visual-panel { flex: 1.4; }
        }

        h1 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--text); letter-spacing: 1.5px; text-align: center; opacity: 0.6; }

        /* --- Сетка настроек --- */
        .settings-panel { display: flex; flex-direction: column; gap: 5px; }
        .row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg); padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
        }
        .row.transparent { background: transparent; border: none; padding: 4px 14px; }
        .label { font-size: 0.85rem; color: #8b949e; display: flex; align-items: center; gap: 8px; }
        .pda-info { color: var(--neon-edge); font-weight: bold; font-size: 1rem; }

        .input-group { display: flex; align-items: center; gap: 4px; }
        input[type="number"] {
            width: 44px; background: #000; border: 1px solid var(--border);
            color: white; padding: 6px 3px; border-radius: 6px;
            text-align: center; font-size: 0.95rem;
        }

        button.tool {
            width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--btn-bg); color: var(--text); cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        button.tool:active { background: #30363d; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--neon-edge); }

        /* --- Визуализация --- */
        .visual-panel { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }

        #phase-name { 
            font-size: 0.8rem; letter-spacing: 4px; font-weight: 500; color: var(--muted); 
            text-transform: uppercase; min-height: 1.2rem;
        }

        #circle-container {
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
            position: relative; margin: 10px auto;
        }

        #circle {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid var(--neon-edge); /* Зеленоватый край */
            /* Гипнотическая заливка: фиолетовое ядро -> зеленоватый край */
            background: radial-gradient(circle, 
                var(--core-purple) 0%, 
                var(--core-purple) 25%, 
                var(--fill-indigo) 60%, 
                rgba(0, 255, 202, 0.2) 90%, 
                transparent 100%
            );
            /* Выраженная зеленоватая аура */
            box-shadow: 0 0 60px var(--glow-out), inset 0 0 30px rgba(0, 255, 202, 0.2);
            transform: scale(0.001);
            will-change: transform;
            position: absolute;
        }

        /* Уменьшенный шрифт обратного отсчета */
        #phase-counter { 
            position: absolute; font-size: 2.5rem; font-weight: 100; color: #fff; 
            text-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 10; pointer-events: none;
        }

        #session-timer { font-size: 0.95rem; color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 15px; }

        /* --- Управление --- */
        .controls { display: flex; justify-content: center; gap: 12px; width: 100%; }
        .btn {
            flex: 1; max-width: 140px; padding: 14px 0; border-radius: 10px; border: 1px solid var(--border);
            font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; letter-spacing: 1px;
        }
        .btn-start { background: #0e1a14; color: #44cf6e; border-color: #1b3225; }
        .btn-pause { background: #1c150b; color: #dbab3a; border-color: #352914; }
        .btn-stop { background: #1a0b0c; color: #f85149; border-color: #351618; }
        
        .btn-focus { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 100%; max-width: 290px; margin-top: 10px;}

        /* --- Финальный экран --- */
        #end-screen {
            position: fixed; inset: 0; background: #000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 25px; text-align: center;
        }
        .motivate-title { font-size: 1.8rem; color: var(--neon-edge); margin-bottom: 30px; font-weight: 200; }
        .stats-box { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px;}
        .stat-item { display: flex; justify-content: space-between; font-size: 1rem; color: #8b949e; }
        .stat-item b { color: #fff; }
        .btn-reset { background: #fff; color: #000; border: none; margin-top: 40px; font-weight: bold; padding: 16px 50px; border-radius: 12px; cursor: pointer;}

        .hidden { display: none !important; }
        body.focus-mode .settings-panel, body.focus-mode h1, body.focus-mode .controls:not(.focus-active-ctrl) { display: none !important; }
        body.focus-mode #circle-container { width: 85vmin; height: 85vmin; }
    </style>
</head>
<body>

<div class="app-wrapper" id="main-app">
    <div class="settings-panel">
        <h1 id="app-title">Таймер ПДА, ТДИ-01</h1>
        
        <div class="row transparent">
            <span class="label">ПДА, сек (справочно)</span>
            <span class="pda-info" id="pda-val">22</span>
        </div>

        <div class="row">
            <span class="label">Время занятия, мин</span>
            <div class="input-group">
                <input type="number" id="in-duration" value="15" min="1">
                <button class="tool" onclick="adj('duration', -1)">−</button>
                <button class="tool" onclick="adj('duration', 1)">+</button>
            </div>
        </div>

        <div class="row">
            <span class="label">Вдох, сек</span>
            <div class="input-group">
                <input type="number" id="in-inhale" value="2" min="1">
                <button class="tool" onclick="adj('inhale', -1)">−</button>
                <button class="tool" onclick="adj('inhale', 1)">+</button>
            </div>
        </div>

        <div class="row">
            <span class="label">Выдох, сек</span>
            <div class="input-group">
                <input type="number" id="in-exhale" value="20" min="1">
                <button class="tool" onclick="adj('exhale', -1)">−</button>
                <button class="tool" onclick="adj('exhale', 1)">+</button>
            </div>
        </div>

        <div class="row">
            <span class="label">Довыдох (пауза), сек</span>
            <div class="input-group">
                <input type="number" id="in-pause" value="0" min="0">
                <button class="tool" onclick="adj('pause', -1)">−</button>
                <button class="tool" onclick="adj('pause', 1)">+</button>
            </div>
        </div>

        <div class="row">
            <span class="label"><input type="checkbox" id="delay-on" checked> Отложенный старт</span>
            <div class="input-group"><input type="number" id="in-delay" value="5" min="1"></div>
        </div>

        <div class="row transparent">
            <span class="label"><input type="checkbox" id="sound-on" checked> Звук</span>
        </div>
    </div>

    <div class="visual-panel">
        <div id="phase-name">ГОТОВ</div>
        <div id="circle-container">
            <div id="circle"></div>
            <div id="phase-counter"></div>
        </div>
        <div id="session-timer">Осталось: 00:00</div>
        <div class="controls">
            <button class="btn btn-stop" onclick="manualStop()">СТОП</button>
            <button class="btn btn-start" id="start-btn" onclick="start()">СТАРТ</button>
            <button class="btn btn-pause hidden" id="pause-btn" onclick="togglePause()">ПАУЗА</button>
        </div>
        <button class="btn btn-focus focus-active-ctrl" onclick="toggleFocus()">ФОКУСИРОВКА</button>
    </div>
</div>

<div id="end-screen">
    <div class="motivate-title">Вы отлично позанимались!</div>
    <div class="stats-box">
        <div class="stat-item">Циклов дыхания: <b id="stat-cycles">0</b></div>
        <div class="stat-item">Суммарный вдох: <b id="stat-inhale">0 сек</b></div>
        <div class="stat-item">Суммарный выдох: <b id="stat-exhale">0 сек</b></div>
        <div class="stat-item" style="border-top:1px solid #161b22; padding-top:10px; margin-top:5px;">Общее время ПДА: <b id="stat-total" style="color:var(--neon-edge)">0 сек</b></div>
    </div>
    <button class="btn btn-reset" onclick="resetApp()">НАЗАД</button>
</div>

<script>
    let audioCtx, timerId, animId, startTime;
    let state = { isRunning: false, isPaused: false, isFinishing: false, currentPhase: 'none', timeLeft: 0, totalTime: 0 };
    let stats = { cycles: 0, inhaleSec: 0, exhaleSec: 0, pauseSec: 0 };

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTick(type = 'normal') {
        if (!document.getElementById('sound-on').checked || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        // Звук чуть мягче для ночи
        osc.frequency.setValueAtTime(type === 'accent' ? 550 : 300, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }

    function adj(id, delta) {
        if (state.isRunning) return;
        const el = document.getElementById('in-' + id);
        el.value = Math.max(el.min, parseInt(el.value) + delta);
        updatePDADisplay();
    }

    // Обновляет только цифру ПДА в интерфейсе
    function updatePDADisplay() {
        const inh = parseInt(document.getElementById('in-inhale').value) || 0;
        const exh = parseInt(document.getElementById('in-exhale').value) || 0;
        const psu = parseInt(document.getElementById('in-pause').value) || 0;
        document.getElementById('pda-val').innerText = inh + exh + psu;
    }

    function start() {
        initAudio();
        // Считываем параметры перед стартом
        updatePDADisplay();
        const durationMin = parseInt(document.getElementById('in-duration').value) || 15;
        const inhaleSec = parseInt(document.getElementById('in-inhale').value) || 2;
        const exhaleSec = parseInt(document.getElementById('in-exhale').value) || 20;
        const pauseSec = parseInt(document.getElementById('in-pause').value) || 0;
        const delaySec = parseInt(document.getElementById('in-delay').value) || 5;

        stats = { cycles: 0, inhaleSec: 0, exhaleSec: 0, pauseSec: 0 };
        state = { 
            isRunning: true, isPaused: false, isFinishing: false, 
            inhale: inhaleSec, exhale: exhaleSec, pause: pauseSec,
            totalTime: durationMin * 60, phaseDuration: 0
        };
        
        document.getElementById('start-btn').classList.add('hidden');
        document.getElementById('pause-btn').classList.remove('hidden');

        if(document.getElementById('delay-on').checked) {
            runPhase('delay', delaySec);
        } else {
            startNextCycle();
        }

        timerId = setInterval(tick, 1000);
        requestAnimationFrame(animate);
    }

    function startNextCycle() {
        if (state.isFinishing) return finishSession();
        stats.cycles++;
        runPhase('inhale', state.inhale);
    }

    function runPhase(phase, duration) {
        state.currentPhase = phase;
        state.timeLeft = duration;
        state.phaseDuration = duration;
        startTime = performance.now();
        const labels = { inhale: 'Вдох', exhale: 'Выдох', pause: 'Довыдох', delay: 'Приготовьтесь' };
        document.getElementById('phase-name').innerText = labels[phase] || '';
    }

    function tick() {
        if(state.isPaused) return;
        state.timeLeft--;
        
        if (state.currentPhase !== 'delay') {
            if (state.totalTime > 0) state.totalTime--;
            if (state.currentPhase === 'inhale') stats.inhaleSec++;
            else if (state.currentPhase === 'exhale') stats.exhaleSec++;
            else if (state.currentPhase === 'pause') stats.pauseSec++;
        }

        if(state.totalTime <= 0) state.isFinishing = true;

        if (state.currentPhase === 'delay') {
            document.getElementById('phase-counter').innerText = state.timeLeft > 0 ? state.timeLeft : '';
            playTick();
        } else if (state.currentPhase === 'exhale' && state.timeLeft <= 5 && state.timeLeft > 0) {
            document.getElementById('phase-counter').innerText = state.timeLeft;
            playTick('accent');
        } else {
            document.getElementById('phase-counter').innerText = '';
        }

        if(state.timeLeft <= 0) {
            if(state.currentPhase === 'delay') startNextCycle();
            else if(state.currentPhase === 'inhale') runPhase('exhale', state.exhale);
            else if(state.currentPhase === 'exhale') {
                if (state.pause > 0) runPhase('pause', state.pause);
                else startNextCycle();
            } else startNextCycle();
        }
        updateUI();
    }

    function updateUI() {
        const m = Math.floor(state.totalTime / 60);
        const s = state.totalTime % 60;
        document.getElementById('session-timer').innerText = `Осталось: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function animate() {
        if(!state.isRunning || state.isPaused) { animId = requestAnimationFrame(animate); return; }
        
        // Защита от деления на 0, если параметры некорректны
        const duration = (state.phaseDuration || 1) * 1000;
        const progress = Math.min((performance.now() - startTime) / duration, 1);
        
        let scale = 0.001;
        if(state.currentPhase === 'inhale') scale = 0.001 + (0.999 * progress);
        else if(state.currentPhase === 'exhale') scale = 1.0 - (0.999 * progress);
        else scale = 0.001; // Задержка или Довыдох - круг сжат

        document.getElementById('circle').style.transform = `scale(${scale})`;
        animId = requestAnimationFrame(animate);
    }

    function finishSession() {
        state.isRunning = false;
        clearInterval(timerId);
        cancelAnimationFrame(animId);
        document.getElementById('stat-cycles').innerText = stats.cycles;
        document.getElementById('stat-inhale').innerText = stats.inhaleSec + " сек";
        document.getElementById('stat-exhale').innerText = stats.exhaleSec + " сек";
        // Общее время только полезных фаз (ПДА)
        document.getElementById('stat-total').innerText = (stats.inhaleSec + stats.exhaleSec + stats.pauseSec) + " сек";
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('end-screen').style.display = 'flex';
    }

    function manualStop() {
        state.isRunning = false;
        clearInterval(timerId);
        cancelAnimationFrame(animId);
        resetUI();
    }

    function resetApp() {
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        resetUI();
    }

    function resetUI() {
        document.getElementById('start-btn').classList.remove('hidden');
        document.getElementById('pause-btn').classList.add('hidden');
        document.getElementById('circle').style.transform = 'scale(0.001)';
        document.getElementById('phase-name').innerText = 'ГОТОВ';
        document.getElementById('phase-counter').innerText = '';
        document.getElementById('session-timer').innerText = 'Осталось: 00:00';
    }

    function togglePause() {
        state.isPaused = !state.isPaused;
        document.getElementById('phase-name').innerText = state.isPaused ? 'ПАУЗА' : '';
        // Аудио контекст тоже ставим на паузу, если нужно (Web Audio API это позволяет)
    }

    function toggleFocus() { document.body.classList.toggle('focus-mode'); }
    
    // Инициализация ПДА при загрузке страницы
    updatePDADisplay();
</script>
</body>
</html>
